name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy isort

      - name: Lint (flake8)
        run: flake8 src tests --max-line-length=100 --extend-ignore=E203,W503,E501

      - name: Format check (black)
        run: black --check --line-length=100 src tests

      - name: Import-order check (isort)
        run: isort --check-only --profile=black --line-length=100 src tests

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports --no-strict-optional || true

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term --cov-report=xml --cov-fail-under=85 -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
