[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "venv|notebooks"

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["src"]
skip = ["venv", "notebooks"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_strict_optional = true
exclude = ["venv", "notebooks"]
