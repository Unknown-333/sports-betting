[tool:pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short --strict-markers
markers =
    asyncio: mark test as async

[coverage:run]
branch = False
omit =
    src/types.py
    src/__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    \.\.\.

